services:
  - type: web
    name: bt7274-mobile
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: MOBILE_ACCESS_KEY
        sync: false
        # Clave secreta que debe coincidir con ACCESS_KEY en
        # mobile/frontend/index.html. Sin esto, la API queda cerrada.
