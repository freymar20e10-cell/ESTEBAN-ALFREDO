<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JARVIS — El Núcleo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{--bg:#0a0a0f;--surface:rgba(20,22,32,0.75);--border:rgba(255,255,255,0.06);--text:#eee;--text-dim:rgba(255,255,255,0.4);--primary:#3b82f6;--primary-foreground:#0a0a0f;--titlebar-h:32px;font-family:'Segoe UI',system-ui,sans-serif;}
.titlebar{position:fixed;top:0;left:0;right:0;height:var(--titlebar-h);background:rgba(8,12,20,0.95);border-bottom:1px solid var(--border);display:none;align-items:center;justify-content:space-between;padding:0 12px;z-index:9999;-webkit-app-region:drag;user-select:none}
.titlebar.show{display:flex}
.titlebar-logo{font-size:.7rem;color:var(--primary);letter-spacing:2px;font-weight:600}
.titlebar-right{display:flex;gap:4px;-webkit-app-region:no-drag}
.titlebar-btn{background:transparent;border:none;color:var(--text-dim);width:28px;height:22px;border-radius:3px;cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center;transition:background .15s}
.titlebar-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.titlebar-close:hover{background:#e81123!important;color:white}
body.titlebar-show{padding-top:var(--titlebar-h)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex}
#core-container{flex:1;display:flex;flex-direction:column;position:relative;z-index:0}
#core-canvas{flex:1;min-height:0;position:relative}
#core-canvas canvas{display:block;width:100%!important;height:100%!important}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;z-index:10}
header h1{font-size:1.25rem;font-weight:900;letter-spacing:.3em;text-transform:uppercase}
header p{font-size:.65rem;letter-spacing:.25em;color:var(--text-dim);margin-top:2px}
.btn-icon{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:8px 16px;font-size:.8rem;cursor:pointer;display:flex;align-items:center;gap:6px;backdrop-filter:blur(8px);transition:all .2s}
.btn-icon:hover{border-color:var(--primary);color:var(--primary)}
#status-area{display:flex;flex-direction:column;align-items:center;gap:8px;padding-bottom:16px}
#status-bar{width:160px;height:4px;border-radius:99px;background:var(--primary);box-shadow:0 0 16px var(--primary);transition:background .6s,box-shadow .6s}
#status-text{font-size:.75rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;transition:color .6s}
#input-area{margin:0 auto 24px;width:100%;max-width:560px;padding:0 16px}
#input-wrapper{background:var(--surface);border:1px solid var(--border);border-radius:999px;display:flex;align-items:center;padding:4px;backdrop-filter:blur(8px)}
#input-wrapper input{flex:1;background:transparent;border:none;padding:10px 16px;color:var(--text);font-size:.85rem;outline:none}
#input-wrapper input::placeholder{color:var(--text-dim)}
#send-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--primary);color:var(--primary-foreground);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s;flex-shrink:0}
#send-btn:disabled{opacity:.5;cursor:default}
/* Conversation panel */
#conv-panel{width:0;overflow:hidden;background:var(--surface);border-right:1px solid var(--border);backdrop-filter:blur(12px);display:flex;flex-direction:column;transition:width .3s;z-index:20}
#conv-panel.open{width:320px}
#conv-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px;border-bottom:1px solid var(--border)}
#conv-header span{font-size:.7rem;font-weight:600;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase}
#conv-close{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px;border-radius:4px}
#conv-close:hover{color:var(--text)}
#conv-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;min-height:0}
#conv-messages .empty{text-align:center;color:var(--text-dim);font-size:.75rem;margin-top:32px}
#conv-toggle{position:absolute;left:16px;top:50%;transform:translateY(-50%);background:var(--surface);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;cursor:pointer;display:none;align-items:center;justify-content:center;color:var(--text-dim);z-index:15}
#conv-toggle.visible{display:flex}
.msg{max-width:85%;padding:8px 14px;border-radius:16px;font-size:.82rem;line-height:1.5;word-break:break-word}
.msg.user{align-self:flex-end;background:var(--primary);color:var(--primary-foreground);border-bottom-right-radius:4px}
.msg.jarvis{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
/* Menu panel */
#menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:30;display:none}
#menu-overlay.open{display:block}
#menu-panel{position:fixed;right:0;top:0;bottom:0;width:360px;max-width:90vw;background:var(--bg);border-left:1px solid var(--border);z-index:40;transform:translateX(100%);transition:transform .3s;overflow-y:auto;padding:0}
#menu-panel.open{transform:translateX(0)}
#menu-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
#menu-header h2{font-size:.75rem;font-weight:600;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase}
#menu-close{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px}
#menu-body{padding:16px 20px 40px}
.block{background:var(--surface);border-radius:16px;padding:16px;margin-top:16px;backdrop-filter:blur(8px)}
.block-title{font-size:.65rem;font-weight:600;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:12px}
.shape-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.shape-btn{border-radius:12px;padding:10px;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim);transition:all .2s;text-align:center}
.shape-btn.active{border-color:var(--primary);background:rgba(59,130,246,.15);color:var(--text)}
.shape-btn:hover:not(.active){border-color:rgba(59,130,246,.5);color:var(--text)}
#intensity-slider{width:100%;accent-color:var(--primary);margin:8px 0}
#intensity-label{font-size:.75rem;color:var(--text-dim)}
.block-hint{font-size:.7rem;color:var(--text-dim);margin-top:8px;line-height:1.4}
/* Logo header area when conv hidden */
#logo-area{display:flex;align-items:center;gap:12px}
#conv-open-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);display:none}
#conv-open-btn.visible{display:flex}
#conv-open-btn:hover{color:var(--text)}
/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- Titlebar (Electron) -->
<div class="titlebar" id="titlebar">
  <span class="titlebar-logo">JARVIS</span>
  <div class="titlebar-right">
    <button class="titlebar-btn" id="btn-minimize" title="Minimizar">─</button>
    <button class="titlebar-btn" id="btn-maximize" title="Maximizar">□</button>
    <button class="titlebar-btn titlebar-close" id="btn-close" title="Cerrar">✕</button>
  </div>
</div>

<!-- Conversation panel -->
<aside id="conv-panel">
  <div id="conv-header">
    <span>Conversación</span>
    <button id="conv-close">✕</button>
  </div>
  <div id="conv-messages"><p class="empty">Aún no hay mensajes. Escríbele a Jarvis.</p></div>
</aside>

<!-- Core container -->
<div id="core-container">
  <header>
    <div id="logo-area">
      <button id="conv-open-btn" class="visible">☰</button>
      <div>
        <h1>JARVIS</h1>
        <p>El Núcleo · Fase 1</p>
      </div>
    </div>
    <button id="menu-btn" class="btn-icon">⚙ Menú</button>
  </header>

  <div id="core-canvas"></div>

  <div id="status-area">
    <div id="status-bar"></div>
    <div id="status-text">Escuchando</div>
  </div>

  <div id="input-area">
    <div id="input-wrapper">
      <input id="msg-input" type="text" placeholder="Escríbele a Jarvis…" autocomplete="off">
      <button id="send-btn">➤</button>
    </div>
  </div>
</div>

<!-- Menu overlay + panel -->
<div id="menu-overlay"></div>
<aside id="menu-panel">
  <div id="menu-header">
    <h2>Menú de control</h2>
    <button id="menu-close">✕</button>
  </div>
  <div id="menu-body">
    <div class="block">
      <div class="block-title">Representación generativa</div>
      <div class="shape-grid" id="shape-grid"></div>
    </div>
    <div class="block">
      <div class="block-title" id="intensity-label">Parámetro · masa/escala (50%)</div>
      <input type="range" id="intensity-slider" min="0" max="1" step="0.01" value="0.5">
      <p class="block-hint">Ajusta la escala/energía de lo representado — como cambiar la "masa" de un agujero negro.</p>
    </div>
  </div>
</aside>

<script>
// ════════════════════ STATES from jarvis-states.ts ════════════════════
const STATES = {
  escuchando: { label: 'Escuchando', color: [0.2, 0.55, 1.0], breathSpeed: 0.9, breathAmp: 0.07, energy: 0.25 },
  pensando:   { label: 'Pensando',   color: [1.0, 0.6, 0.12],  breathSpeed: 1.6, breathAmp: 0.11, energy: 0.8 },
  listo:      { label: 'Listo',      color: [0.25, 0.9, 0.5],  breathSpeed: 1.1, breathAmp: 0.09, energy: 0.4 },
  error:      { label: 'Error',      color: [1.0, 0.25, 0.35], breathSpeed: 3.0, breathAmp: 0.18, energy: 1.0 },
};

// ════════════════════ SHAPES from jarvis-shapes.ts ════════════════════
const SHAPES = [
  { id: 'sphere', label: 'Esfera' }, { id: 'cube', label: 'Cubo' },
  { id: 'torus', label: 'Toroide' }, { id: 'ring', label: 'Anillos' },
  { id: 'spiral', label: 'Espiral' }, { id: 'wave', label: 'Onda' },
  { id: 'pyramid', label: 'Pirámide' }, { id: 'galaxy', label: 'Galaxia' },
];
const R = 2.2;

function genShape(id, count) {
  switch (id) {
    case 'sphere': return fibSphere(count, R);
    case 'cube': return genCube(count, R * 0.8);
    case 'torus': return genTorus(count, R * 0.9, R * 0.35);
    case 'ring': return genRing(count);
    case 'spiral': return genSpiral(count);
    case 'wave': return genWave(count);
    case 'pyramid': return genPyramid(count, R * 0.85);
    case 'galaxy': return genGalaxy(count);
    default: return fibSphere(count, R);
  }
}
function fibSphere(n, radius) {
  const p = new Float32Array(n * 3);
  const golden = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y = 1 - (i / (n - 1)) * 2;
    const r = Math.sqrt(1 - y * y);
    const theta = golden * i;
    p[i * 3] = Math.cos(theta) * r * radius;
    p[i * 3 + 1] = y * radius;
    p[i * 3 + 2] = Math.sin(theta) * r * radius;
  }
  return p;
}
function genCube(n, size) {
  const p = new Float32Array(n * 3);
  const h = size;
  for (let i = 0; i < n; i++) {
    const face = i % 6;
    const u = (Math.random() * 2 - 1) * h;
    const v = (Math.random() * 2 - 1) * h;
    let x = 0, y = 0, z = 0;
    switch (face) {
      case 0: x = h; y = u; z = v; break;
      case 1: x = -h; y = u; z = v; break;
      case 2: y = h; x = u; z = v; break;
      case 3: y = -h; x = u; z = v; break;
      case 4: z = h; x = u; y = v; break;
      default: z = -h; x = u; y = v; break;
    }
    p[i * 3] = x; p[i * 3 + 1] = y; p[i * 3 + 2] = z;
  }
  return p;
}
function genTorus(n, majorR, minorR) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const u = Math.random() * Math.PI * 2;
    const v = Math.random() * Math.PI * 2;
    p[i * 3] = (majorR + minorR * Math.cos(v)) * Math.cos(u);
    p[i * 3 + 1] = minorR * Math.sin(v);
    p[i * 3 + 2] = (majorR + minorR * Math.cos(v)) * Math.sin(u);
  }
  return p;
}
function genRing(n) {
  const p = new Float32Array(n * 3);
  const rings = 3;
  for (let i = 0; i < n; i++) {
    const ri = i % rings;
    const radius = R * (0.6 + ri * 0.28);
    const a = Math.random() * Math.PI * 2;
    const jitter = (Math.random() - 0.5) * 0.12;
    p[i * 3] = Math.cos(a) * radius + jitter;
    p[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
    p[i * 3 + 2] = Math.sin(a) * radius + jitter;
  }
  return p;
}
function genSpiral(n) {
  const p = new Float32Array(n * 3);
  const turns = 5;
  for (let i = 0; i < n; i++) {
    const t = i / n;
    const a = t * Math.PI * 2 * turns;
    const radius = t * R * 1.4;
    p[i * 3] = Math.cos(a) * radius;
    p[i * 3 + 1] = (t - 0.5) * R * 1.6;
    p[i * 3 + 2] = Math.sin(a) * radius;
  }
  return p;
}
function genWave(n) {
  const p = new Float32Array(n * 3);
  const side = Math.ceil(Math.sqrt(n));
  for (let i = 0; i < n; i++) {
    const gx = (i % side) / side - 0.5;
    const gz = Math.floor(i / side) / side - 0.5;
    const x = gx * R * 3;
    const z = gz * R * 3;
    const y = Math.sin(x * 1.3) * Math.cos(z * 1.3) * 0.9;
    p[i * 3] = x; p[i * 3 + 1] = y; p[i * 3 + 2] = z;
  }
  return p;
}
function genPyramid(n, size) {
  const p = new Float32Array(n * 3);
  const apex = [0, size, 0];
  const base = [[-size,-size,-size],[size,-size,-size],[size,-size,size],[-size,-size,size]];
  for (let i = 0; i < n; i++) {
    if (i % 5 === 0) {
      const a = base[Math.floor(Math.random() * 4)];
      const b = base[Math.floor(Math.random() * 4)];
      const t = Math.random();
      p[i * 3] = a[0] + (b[0] - a[0]) * t;
      p[i * 3 + 1] = -size;
      p[i * 3 + 2] = a[2] + (b[2] - a[2]) * t;
    } else {
      const edge = base[Math.floor(Math.random() * 4)];
      const t = Math.random();
      p[i * 3] = edge[0] + (apex[0] - edge[0]) * t;
      p[i * 3 + 1] = edge[1] + (apex[1] - edge[1]) * t;
      p[i * 3 + 2] = edge[2] + (apex[2] - edge[2]) * t;
    }
  }
  return p;
}
function genGalaxy(n) {
  const p = new Float32Array(n * 3);
  const arms = 4;
  for (let i = 0; i < n; i++) {
    const arm = i % arms;
    const t = Math.pow(Math.random(), 0.6);
    const radius = t * R * 1.6;
    const a = arm * (Math.PI * 2 / arms) + t * 3.5;
    const spread = (1 - t) * 0.5;
    p[i * 3] = Math.cos(a) * radius + (Math.random() - 0.5) * spread;
    p[i * 3 + 1] = (Math.random() - 0.5) * spread * 0.6;
    p[i * 3 + 2] = Math.sin(a) * radius + (Math.random() - 0.5) * spread;
  }
  return p;
}

// ════════════════════ THREE.JS CORE ════════════════════
const cores = navigator.hardwareConcurrency || 4;
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const COUNT = reducedMotion ? 900 : (cores <= 4 ? 1800 : cores <= 8 ? 3000 : 4200);
const FRAME_INTERVAL = cores <= 4 ? 1000 / 30 : 1000 / 60;
const mount = document.getElementById('core-canvas');
const width = mount.clientWidth || 800;
const height = mount.clientHeight || 600;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 100);
camera.position.z = 7;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
mount.appendChild(renderer.domElement);

let currentState = 'escuchando';
let currentShape = 'sphere';
let intensity = 0.5;

const current = genShape(currentShape, COUNT);
const target = genShape(currentShape, COUNT);
const source = current.slice();
const seeds = new Float32Array(COUNT);
for (let i = 0; i < COUNT; i++) seeds[i] = Math.random();

const colors = new Float32Array(COUNT * 3);
const colorSource = new Float32Array(COUNT * 3);
const colorTarget = new Float32Array(COUNT * 3);
const hueJitter = new Float32Array(COUNT);
const briJitter = new Float32Array(COUNT);
for (let i = 0; i < COUNT; i++) {
  hueJitter[i] = (Math.random() - 0.5) * 0.12;
  briJitter[i] = 0.75 + Math.random() * 0.5;
}

const tmpColor = new THREE.Color();
const baseHSL = { h: 0, s: 0, l: 0 };

function fillColorTarget(rgb) {
  tmpColor.setRGB(rgb[0], rgb[1], rgb[2]);
  tmpColor.getHSL(baseHSL);
  for (let i = 0; i < COUNT; i++) {
    const h = (baseHSL.h + hueJitter[i] + 1) % 1;
    const l = Math.min(1, Math.max(0.15, baseHSL.l * briJitter[i]));
    tmpColor.setHSL(h, Math.min(1, baseHSL.s + 0.1), l);
    colorTarget[i * 3] = tmpColor.r;
    colorTarget[i * 3 + 1] = tmpColor.g;
    colorTarget[i * 3 + 2] = tmpColor.b;
  }
}
fillColorTarget(STATES[currentState].color);
colors.set(colorTarget);
colorSource.set(colorTarget);
let colorMix = 1;

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(current, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

// particle texture
const texCanvas = document.createElement('canvas');
texCanvas.width = texCanvas.height = 64;
const tCtx = texCanvas.getContext('2d');
const grad = tCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
grad.addColorStop(0, 'rgba(255,255,255,1)');
grad.addColorStop(0.25, 'rgba(255,255,255,0.85)');
grad.addColorStop(0.55, 'rgba(255,255,255,0.25)');
grad.addColorStop(1, 'rgba(255,255,255,0)');
tCtx.fillStyle = grad;
tCtx.fillRect(0, 0, 64, 64);
const tex = new THREE.Texture(texCanvas);
tex.needsUpdate = true;

const material = new THREE.PointsMaterial({
  size: 0.055, map: tex, transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending, vertexColors: true,
});

const pivot = new THREE.Group();
scene.add(pivot);
const points = new THREE.Points(geometry, material);
pivot.add(points);

// glow
const glowGeo = new THREE.SphereGeometry(0.6, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({
  color: new THREE.Color(...STATES[currentState].color),
  transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending,
});
const glow = new THREE.Mesh(glowGeo, glowMat);
pivot.add(glow);

// orbit controls
let rotX = 0, rotY = 0, velX = 0, velY = 0;
let dragging = false, lastPX = 0, lastPY = 0, lastMoveT = 0;
const el = renderer.domElement;
el.style.touchAction = 'none'; el.style.cursor = 'grab';

el.addEventListener('pointerdown', e => {
  dragging = true; lastPX = e.clientX; lastPY = e.clientY;
  velX = 0; velY = 0; el.style.cursor = 'grabbing';
  el.setPointerCapture(e.pointerId);
});
el.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastPX, dy = e.clientY - lastPY;
  lastPX = e.clientX; lastPY = e.clientY;
  rotY += dx * 0.008; rotX += dy * 0.008;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  velY = dx * 0.008; velX = dy * 0.008;
  lastMoveT = performance.now();
});
el.addEventListener('pointerup', e => {
  dragging = false; el.style.cursor = 'grab';
  try { el.releasePointerCapture(e.pointerId); } catch {}
  if (performance.now() - lastMoveT > 80) { velX = 0; velY = 0; }
});
el.addEventListener('pointercancel', e => {
  dragging = false; el.style.cursor = 'grab';
  try { el.releasePointerCapture(e.pointerId); } catch {}
});

let morph = 1, lastShape = currentShape, lastState = currentState;
const glowColor = new THREE.Color(...STATES[currentState].color);
const clock = new THREE.Clock();

let lastFrameTime = 0;
function tick(frameTime = 0) {
  if (document.hidden || frameTime - lastFrameTime < FRAME_INTERVAL) {
    requestAnimationFrame(tick);
    return;
  }
  lastFrameTime = frameTime;
  const t = clock.getElapsedTime();
  const style = STATES[currentState];

  if (currentShape !== lastShape) {
    source.set(current);
    target.set(genShape(currentShape, COUNT));
    lastShape = currentShape; morph = 0;
  }
  if (morph < 1) morph = Math.min(1, morph + 0.02);

  if (currentState !== lastState) {
    colorSource.set(colors);
    fillColorTarget(style.color);
    lastState = currentState; colorMix = 0;
  }
  if (colorMix < 1) colorMix = Math.min(1, colorMix + 0.03);

  const ease = morph * morph * (3 - 2 * morph);
  const breath = 1 + Math.sin(t * style.breathSpeed) * style.breathAmp;
  const scale = breath * (0.7 + intensity * 0.6);
  const energy = style.energy;

  const arr = geometry.attributes.position.array;
  const cArr = geometry.attributes.color.array;
  const shimmer = 0.9 + Math.sin(t * 2) * 0.1;

  for (let i = 0; i < COUNT; i++) {
    const ix = i * 3, seed = seeds[i];
    const bx = source[ix] + (target[ix] - source[ix]) * ease;
    const by = source[ix+1] + (target[ix+1] - source[ix+1]) * ease;
    const bz = source[ix+2] + (target[ix+2] - source[ix+2]) * ease;
    const wob = Math.sin(t * (1 + seed) + seed * 6.28) * 0.06 * energy;
    arr[ix] = bx * scale + wob;
    arr[ix+1] = by * scale + Math.cos(t * (0.8 + seed) + seed * 3.14) * 0.06 * energy;
    arr[ix+2] = bz * scale + wob;
    const tw = 0.85 + Math.sin(t * (1.5 + seed * 2) + seed * 6.28) * 0.15;
    const cm = colorMix;
    cArr[ix] = (colorSource[ix] + (colorTarget[ix] - colorSource[ix]) * cm) * tw * shimmer;
    cArr[ix+1] = (colorSource[ix+1] + (colorTarget[ix+1] - colorSource[ix+1]) * cm) * tw * shimmer;
    cArr[ix+2] = (colorSource[ix+2] + (colorTarget[ix+2] - colorSource[ix+2]) * cm) * tw * shimmer;
  }
  geometry.attributes.position.needsUpdate = true;
  geometry.attributes.color.needsUpdate = true;

  const target3 = style.color;
  glowColor.lerp(new THREE.Color(target3[0], target3[1], target3[2]), 0.06);
  glowMat.color.copy(glowColor);
  glowMat.opacity = 0.1 + Math.sin(t * style.breathSpeed) * 0.05 + energy * 0.05;

  if (!dragging) {
    rotY += velY; rotX += velX;
    velX *= 0.94; velY *= 0.94;
    rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
    if (Math.abs(velX) + Math.abs(velY) < 0.0005) rotY += 0.0012 + energy * 0.001;
  }
  pivot.rotation.y = rotY;
  pivot.rotation.x = rotX;
  points.rotation.x = Math.sin(t * 0.15) * 0.05;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

window.addEventListener('resize', () => {
  const w = mount.clientWidth || 800;
  const h = mount.clientHeight || 600;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// ════════════════════ UI CONTROLS ════════════════════
function setState(state) {
  currentState = state;
  const style = STATES[state];
  const rgb = style.color;
  const cssColor = `rgb(${Math.round(rgb[0]*255)},${Math.round(rgb[1]*255)},${Math.round(rgb[2]*255)})`;
  document.getElementById('status-bar').style.background = cssColor;
  document.getElementById('status-bar').style.boxShadow = `0 0 16px ${cssColor}`;
  document.getElementById('status-text').style.color = cssColor;
  document.getElementById('status-text').textContent = style.label;
}

function setShape(shape) {
  currentShape = shape;
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.toggle('active', b.dataset.shape === shape));
}

function setIntensity(val) {
  intensity = parseFloat(val);
  document.getElementById('intensity-label').textContent = `Parámetro · masa/escala (${Math.round(intensity * 100)}%)`;
}

// Shape buttons
const shapeGrid = document.getElementById('shape-grid');
SHAPES.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'shape-btn' + (s.id === 'sphere' ? ' active' : '');
  btn.dataset.shape = s.id;
  btn.textContent = s.label;
  btn.addEventListener('click', () => setShape(s.id));
  shapeGrid.appendChild(btn);
});

// Intensity slider
document.getElementById('intensity-slider').addEventListener('input', e => setIntensity(e.target.value));

// Menu toggle
document.getElementById('menu-btn').addEventListener('click', () => {
  document.getElementById('menu-panel').classList.add('open');
  document.getElementById('menu-overlay').classList.add('open');
});
document.getElementById('menu-close').addEventListener('click', () => {
  document.getElementById('menu-panel').classList.remove('open');
  document.getElementById('menu-overlay').classList.remove('open');
});
document.getElementById('menu-overlay').addEventListener('click', () => {
  document.getElementById('menu-panel').classList.remove('open');
  document.getElementById('menu-overlay').classList.remove('open');
});

// Conversation panel
const convPanel = document.getElementById('conv-panel');
const convMessages = document.getElementById('conv-messages');

function toggleConv(open) {
  convPanel.classList.toggle('open', open);
  document.getElementById('conv-open-btn').classList.toggle('visible', !open);
}

document.getElementById('conv-open-btn').addEventListener('click', () => toggleConv(true));
document.getElementById('conv-close').addEventListener('click', () => toggleConv(false));

function addMessage(role, text) {
  if (!convPanel.classList.contains('open')) toggleConv(true);
  const empty = convMessages.querySelector('.empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  convMessages.appendChild(div);
  convMessages.scrollTop = convMessages.scrollHeight;
}

// ════════════════════ WEBSOCKET ════════════════════
let ws = null;
let sending = false;

function connectWS() {
  ws = new WebSocket('ws://127.0.0.1:8765');
  ws.onopen = () => { setState('escuchando'); };
  ws.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.type === 'response') {
      sending = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('msg-input').disabled = false;
      addMessage('jarvis', data.content);
      setState('listo');
      setTimeout(() => setState('escuchando'), 1800);
    } else if (data.type === 'voice_detected') {
      addMessage('user', data.content);
      setState('pensando');
    } else if (data.type === 'status') {
      if (data.state === 'listening') setState('escuchando');
      else if (data.state === 'processing') setState('pensando');
    } else if (data.type === 'layout_update') {
      // widget layout not needed for this UI version
    } else if (data.type === 'plan_start') {
      addMessage('jarvis', `🗂️ Voy a hacer esto en ${data.total} pasos...`);
    } else if (data.type === 'plan_step') {
      const paso = `Paso ${data.index + 1}/${data.total}: ${data.description}`;
      document.getElementById('status-text').textContent =
        data.status === 'running' ? `⚙️ ${paso}` : `✅ ${paso}`;
    } else if (data.type === 'plan_end') {
      setState('pensando');
    } else if (data.type === 'confirmation_request') {
      const ok = window.confirm(`BT-7274 pide confirmación:\n\n${data.description}`);
      ws.send(JSON.stringify({
        type: 'confirmation_response',
        id: data.id,
        approved: ok,
      }));
    }
  };
  ws.onclose = () => { setTimeout(connectWS, 3000); };
  ws.onerror = () => {};
}
connectWS();

function sendMessage(text) {
  if (!text || sending || !ws || ws.readyState !== WebSocket.OPEN) return;
  sending = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('msg-input').disabled = true;
  addMessage('user', text);
  setState('pensando');
  ws.send(JSON.stringify({ type: 'message', content: text }));
}

document.getElementById('send-btn').addEventListener('click', () => {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (text) { input.value = ''; sendMessage(text); }
});
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const text = e.target.value.trim();
    if (text) { e.target.value = ''; sendMessage(text); }
  }
});

// Electron integration
if (window.btAPI) {
  document.getElementById('titlebar').classList.add('show');
  document.body.classList.add('titlebar-show');
  document.getElementById('btn-minimize').addEventListener('click', () => window.btAPI.minimize());
  document.getElementById('btn-maximize').addEventListener('click', () => window.btAPI.maximize());
  document.getElementById('btn-close').addEventListener('click', () => window.btAPI.close());
  window.btAPI.on('open-settings', () => { document.getElementById('menu-btn').click(); });
  window.btAPI.on('toggle-voice-chat', () => { /* future: toggle voice */ });
}
